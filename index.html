<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HuskyNow</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      background: #f4ead8;
      color: #2a2118;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
    }

    .page {
      position: relative;
      width: 100%;
      max-width: 820px;
      min-height: 620px;
      background: #fffaf0;
      border: 2px solid #2a2118;
      border-radius: 34px;
      box-shadow: 10px 10px 0 #2a2118;
      overflow: hidden;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.28;
      background-image:
        radial-gradient(#d8c6a6 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.55), transparent 40%);
      background-size: 18px 18px, 100% 100%;
    }

    .hero {
      position: relative;
      z-index: 1;
      min-height: 620px;
      padding: 64px 64px 44px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 48px;
    }

    .brand {
      width: fit-content;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.88rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #4b2e83;
      background: #f7df74;
      border: 2px solid #2a2118;
      border-radius: 999px;
      padding: 9px 15px;
      transform: rotate(-2deg);
      box-shadow: 3px 3px 0 #2a2118;
    }

    h1 {
      max-width: 680px;
      margin-top: 48px;
      font-size: clamp(4rem, 12vw, 8.5rem);
      line-height: 0.78;
      letter-spacing: -0.08em;
      color: #321f55;
    }

    .tagline {
      max-width: 560px;
      margin-top: 32px;
      font-size: clamp(1.6rem, 3.5vw, 2.7rem);
      line-height: 1.05;
      color: #2a2118;
    }

    .description {
      max-width: 500px;
      margin-top: 20px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 1.04rem;
      line-height: 1.65;
      color: #675644;
    }

    .signup {
      display: flex;
      align-items: center;
      gap: 12px;
      max-width: 520px;
      margin-top: 34px;
      font-family: Arial, Helvetica, sans-serif;
    }

    .signup input {
      flex: 1;
      min-width: 0;
      border: 2px solid #2a2118;
      border-radius: 999px;
      background: #fffdf6;
      padding: 16px 20px;
      font-size: 1rem;
      color: #2a2118;
      outline: none;
      box-shadow: 4px 4px 0 #2a2118;
    }

    .signup input:focus {
      background: #fff8df;
    }

    .signup button {
      border: 2px solid #2a2118;
      border-radius: 999px;
      background: #4b2e83;
      color: #fffaf0;
      padding: 16px 24px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 4px 4px 0 #2a2118;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .signup button:hover {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 #2a2118;
    }

    .note {
      width: fit-content;
      margin-top: 18px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.96rem;
      color: #2a2118;
      background: #f7df74;
      border: 2px solid #2a2118;
      border-radius: 18px;
      padding: 10px 14px;
      transform: rotate(1.5deg);
      box-shadow: 3px 3px 0 #2a2118;
    }

    footer {
      max-width: 420px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.92rem;
      line-height: 1.5;
      color: #7a6752;
    }

    .float {
      position: absolute;
      z-index: 0;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 800;
      color: #2a2118;
      border: 2px solid #2a2118;
      background: #fffdf6;
      border-radius: 999px;
      padding: 8px 13px;
      box-shadow: 3px 3px 0 #2a2118;
      user-select: none;
    }

    .float.events {
      top: 92px;
      right: 70px;
      background: #ffd7c2;
      transform: rotate(9deg);
    }

    .float.clubs {
      top: 250px;
      right: 42px;
      background: #d7e8ff;
      transform: rotate(-8deg);
    }

    .float.talks {
      right: 98px;
      bottom: 150px;
      background: #dff3cf;
      transform: rotate(7deg);
    }

    .float.arrow {
      left: 44px;
      bottom: 150px;
      background: transparent;
      border: none;
      box-shadow: none;
      font-size: 2.2rem;
      transform: rotate(-18deg);
    }

    .doodle {
      position: absolute;
      z-index: 0;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 900;
      color: #4b2e83;
      user-select: none;
    }

    .doodle.star-one {
      top: 172px;
      right: 214px;
      font-size: 2.6rem;
      transform: rotate(12deg);
    }

    .doodle.star-two {
      left: 72px;
      bottom: 235px;
      font-size: 2rem;
      color: #b88b00;
      transform: rotate(-8deg);
    }

    .doodle.loop {
      right: 42px;
      bottom: 54px;
      width: 110px;
      height: 56px;
      border: 3px solid #2a2118;
      border-left-color: transparent;
      border-bottom-color: transparent;
      border-radius: 50%;
      transform: rotate(-22deg);
    }

    @media (max-width: 720px) {
      body {
        padding: 16px;
      }

      .page {
        min-height: auto;
        border-radius: 24px;
        box-shadow: 6px 6px 0 #2a2118;
      }

      .hero {
        min-height: 620px;
        padding: 40px 28px 32px;
      }

      h1 {
        margin-top: 40px;
      }

      .signup {
        flex-direction: column;
        align-items: stretch;
      }

      .signup button {
        width: 100%;
      }

      .float.events {
        top: 86px;
        right: 24px;
      }

      .float.clubs,
      .float.talks,
      .doodle.loop {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
